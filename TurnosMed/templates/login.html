{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - TurnosMed</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-box">
        <h2 style="text-align: center;">TurnosMed</h2>
        <form method="POST">
            {% csrf_token %}
            {% if error %}
                <div class="error-msg">
                    {{ error }}
                </div>
            {% endif %}
            {{ form.as_p }}
            <button type="submit">Ingresar</button>
        </form>
    </div>
</body>
</html>
